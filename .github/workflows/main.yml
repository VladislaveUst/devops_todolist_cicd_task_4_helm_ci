name: python-deployment

run-name: ${{ github.actor }} - ${{ github.ref_name }} - ${{ github.sha }}

on:
  push:
    branches:
      - your_name
  pull_request:
    branches:
      - your_name

env:
  PythonVersion: "3.8"
  DockerImageName: todoapp

jobs:
  python-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PythonVersion }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage flake8

      - name: Run tests
        run: |
          python manage.py test

      - name: Generate Coverage Report
        run: |
          coverage run --source='.' manage.py test
          coverage report

      - name: Linting
        run: |
          flake8 . --show-source --statistics --exit-zero

      - name: Check Complexity
        run: |
          flake8 . --max-complexity=6 --exit-zero

      - name: Upload project artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-artifacts
          path: .

  docker-ci:
    name: Docker CI
    runs-on: ubuntu-latest
    needs: python-ci
    if: github.ref_name == 'refs/heads/your_name'

    steps:
      - name: Download project artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-artifacts
          path: .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DockerImageName }}:${{ github.sha }}

  helm-ci:
    name: Helm CI
    runs-on: ubuntu-latest
    needs: python-ci
    if: github.ref_name == 'vladisloveust'

    steps:
      - name: Download project artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-artifacts
          path: .

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm Template
        run: |
          helm template todoapp helm-charts/todoapp

      - name: Helm Lint
        run: |
          helm lint helm-charts/todoapp

      - name: Package Helm Chart
        run: |
          mkdir -p packaged-chart
          helm package helm-charts/todoapp --destination packaged-chart

      - name: Upload Helm package
        uses: actions/upload-artifact@v4
        with:
          name: helm-package
          path: packaged-chart/*.tgz
